<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bibliothèque{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ── Variables ─────────────────────────── */
        :root {
            --bg:          #0F172A;
            --sidebar:     #1E293B;
            --card:        #1E293B;
            --accent:      #6366F1;
            --accent-h:    #4F46E5;
            --text-1:      #F1F5F9;
            --text-2:      #94A3B8;
            --success:     #10B981;
            --danger:      #EF4444;
            --border:      #334155;
        }

        /* ── Reset / Base ──────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
        }

        a { text-decoration: none; }

        /* ── Layout ─────────────────────────────── */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ────────────────────────────── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 50;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 26px 22px 22px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-h));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }

        .logo-sub {
            font-size: 0.68rem;
            color: var(--text-2);
            margin-top: 1px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-section-label {
            font-size: 0.63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-2);
            padding: 6px 10px 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--text-2);
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .sidebar-link:hover {
            background: rgba(99,102,241,0.08);
            color: var(--text-1);
        }

        .sidebar-link.active {
            background: rgba(99,102,241,0.14);
            color: var(--accent);
        }

        .sidebar-link i {
            font-size: 1rem;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(99,102,241,0.18);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 0.83rem;
            font-weight: 600;
            color: var(--text-1);
        }

        .user-role {
            font-size: 0.7rem;
            color: var(--text-2);
        }

        /* ── Main content ───────────────────────── */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 34px 38px;
            min-height: 100vh;
        }

        /* ── Flash messages ─────────────────────── */
        .flash-list { margin-bottom: 22px; }

        .flash-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.865rem;
            font-weight: 500;
            border: 1px solid;
        }

        .flash-item.alert-success {
            background: rgba(16,185,129,0.1);
            color: #34D399;
            border-color: rgba(16,185,129,0.2);
        }
        .flash-item.alert-danger, .flash-item.alert-error {
            background: rgba(239,68,68,0.1);
            color: #F87171;
            border-color: rgba(239,68,68,0.2);
        }
        .flash-item.alert-warning {
            background: rgba(245,158,11,0.1);
            color: #FCD34D;
            border-color: rgba(245,158,11,0.2);
        }
        .flash-item.alert-info {
            background: rgba(99,102,241,0.1);
            color: #A5B4FC;
            border-color: rgba(99,102,241,0.2);
        }

        .flash-close {
            background: none; border: none;
            cursor: pointer; color: inherit;
            opacity: 0.6; padding: 2px; font-size: 0.75rem;
            display: flex; align-items: center;
        }
        .flash-close:hover { opacity: 1; }

        /* ── Page header ────────────────────────── */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 26px;
            gap: 16px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-1);
            margin: 0 0 4px;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: 0.83rem;
            color: var(--text-2);
            margin: 0;
        }

        /* ── Stats row ──────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-icon {
            width: 46px; height: 46px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .stat-icon.indigo { background: rgba(99,102,241,0.12); color: var(--accent); }
        .stat-icon.green  { background: rgba(16,185,129,0.12); color: var(--success); }
        .stat-icon.red    { background: rgba(239,68,68,0.12);  color: var(--danger); }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-1);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 0.74rem;
            color: var(--text-2);
            margin-top: 3px;
            font-weight: 500;
        }

        /* ── Toolbar (search) ───────────────────── */
        .toolbar {
            margin-bottom: 18px;
        }

        .search-wrap {
            flex: 1;
            position: relative;
            max-width: 420px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-2);
            font-size: 0.88rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--card) !important;
            border: 1px solid var(--border) !important;
            border-radius: 999px !important;
            padding: 9px 16px 9px 38px !important;
            color: var(--text-1) !important;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: var(--text-2) !important; }
        .search-input:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12) !important;
        }

        /* ── Buttons ────────────────────────────── */
        .btn-primary-custom {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            color: #fff !important;
            border: none;
            border-radius: 999px;
            padding: 9px 20px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary-custom:hover { opacity: 0.88; transform: translateY(-1px); color: #fff !important; }

        .btn-ghost-custom {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            color: var(--text-2) !important;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 9px 20px;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-ghost-custom:hover { border-color: var(--text-2); color: var(--text-1) !important; }

        .btn-danger-custom {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: #fff !important;
            border: none;
            border-radius: 999px;
            padding: 9px 20px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .btn-danger-custom:hover { opacity: 0.88; color: #fff !important; }

        /* ── Table ──────────────────────────────── */
        .table-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .dark-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dark-table thead tr {
            background: rgba(51,65,85,0.4);
            border-bottom: 1px solid var(--border);
        }

        .dark-table thead th {
            padding: 11px 16px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-2);
            white-space: nowrap;
        }

        .dark-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        .dark-table tbody tr:last-child { border-bottom: none; }
        .dark-table tbody tr:hover { background: rgba(99,102,241,0.04); }

        .dark-table tbody td {
            padding: 13px 16px;
            vertical-align: middle;
            color: var(--text-1);
            font-size: 0.875rem;
        }

        .cell-id   { color: var(--text-2); font-size: 0.8rem; }
        .cell-title { font-weight: 600; }
        .cell-author { color: var(--text-2); }

        .isbn-tag {
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            background: rgba(51,65,85,0.6);
            padding: 2px 7px;
            border-radius: 4px;
            color: var(--text-2);
        }

        .prix-display { font-weight: 600; }
        .prix-display .currency {
            font-size: 0.75rem;
            color: var(--text-2);
            margin-left: 1px;
        }

        .badge-dispo {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.73rem;
            font-weight: 600;
        }
        .badge-dispo i { font-size: 0.5rem; }
        .badge-dispo.yes { background: rgba(16,185,129,0.12); color: var(--success); }
        .badge-dispo.no  { background: rgba(239,68,68,0.12);  color: var(--danger); }

        .btn-icon {
            width: 30px; height: 30px;
            border: none;
            border-radius: 7px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.83rem;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .btn-icon.edit { background: rgba(99,102,241,0.12); color: var(--accent) !important; }
        .btn-icon.edit:hover { background: rgba(99,102,241,0.24); }
        .btn-icon.del  { background: rgba(239,68,68,0.12);  color: var(--danger) !important; }
        .btn-icon.del:hover  { background: rgba(239,68,68,0.24); }

        /* ── Empty state ────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 58px 24px;
            color: var(--text-2);
        }
        .empty-icon { font-size: 2.8rem; display: block; margin-bottom: 14px; opacity: 0.45; }
        .empty-title { font-size: 1rem; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
        .empty-sub   { font-size: 0.85rem; margin-bottom: 20px; }

        /* ── Form page ──────────────────────────── */
        .form-page-wrap {
            display: flex;
            justify-content: center;
            padding: 4px 0;
        }

        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 580px;
            overflow: hidden;
        }

        .form-card-header {
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .form-header-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: rgba(99,102,241,0.14);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .form-header-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-1);
            margin: 0;
        }

        .form-header-sub {
            font-size: 0.75rem;
            color: var(--text-2);
            margin-top: 2px;
        }

        .form-card-body { padding: 28px; }

        .form-field { margin-bottom: 18px; }

        .field-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-2);
            margin-bottom: 7px;
        }

        .required-star { color: var(--danger); font-size: 0.7rem; }

        .dark-input {
            display: block;
            width: 100%;
            background: rgba(15,23,42,0.7) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            padding: 10px 14px !important;
            color: var(--text-1) !important;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .dark-input::placeholder { color: var(--text-2) !important; }
        .dark-input:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12) !important;
        }
        .dark-input.is-invalid { border-color: var(--danger) !important; }
        .dark-input[type="date"] { color-scheme: dark; }
        .dark-input.font-mono { font-family: 'Courier New', monospace; font-size: 0.85rem; }

        .field-error {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--danger);
            font-size: 0.79rem;
            margin-top: 5px;
        }

        .field-hint {
            color: var(--text-2);
            font-size: 0.77rem;
            margin-top: 5px;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            background: rgba(15,23,42,0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .toggle-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-1);
            cursor: pointer;
            display: block;
        }

        .toggle-hint {
            font-size: 0.74rem;
            color: var(--text-2);
            margin-top: 2px;
        }

        /* Bootstrap switch override for dark theme */
        .form-check-input {
            background-color: var(--border) !important;
            border-color: var(--border) !important;
        }
        .form-check-input:checked {
            background-color: var(--accent) !important;
            border-color: var(--accent) !important;
        }
        .form-check-input:focus {
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12) !important;
            border-color: var(--accent) !important;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            padding-top: 6px;
        }

        /* ── Delete confirm ──────────────────────── */
        .delete-page-wrap {
            display: flex;
            justify-content: center;
            padding: 4px 0;
        }

        .delete-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .delete-card-header {
            background: rgba(239,68,68,0.07);
            border-bottom: 1px solid rgba(239,68,68,0.14);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .delete-card-header i { color: var(--danger); font-size: 1.05rem; }
        .delete-card-header h4 {
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--danger);
            margin: 0;
        }

        .delete-card-body {
            padding: 32px 28px;
            text-align: center;
        }

        .delete-icon-wrap {
            width: 68px; height: 68px;
            border-radius: 50%;
            background: rgba(239,68,68,0.1);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: var(--danger);
        }

        .delete-question  { font-size: 0.9rem; color: var(--text-2); margin-bottom: 8px; }
        .delete-book-title { font-size: 1.2rem; font-weight: 700; color: var(--text-1); margin-bottom: 4px; font-style: italic; }
        .delete-book-author { font-size: 0.875rem; color: var(--text-2); margin-bottom: 22px; }

        .delete-warning {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.14);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.79rem;
            color: #F87171;
            margin-bottom: 24px;
        }

        .delete-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
    </style>
</head>
<body>

<div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <i class="bi bi-book-fill"></i>
            </div>
            <div>
                <div class="logo-name">Bibliothèque</div>
                <div class="logo-sub">Gestion de livres</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Navigation</div>
            <a href="{% url 'livre-list' %}" class="sidebar-link {% block nav_accueil %}{% endblock %}">
                <i class="bi bi-house-door-fill"></i>
                <span>Tableau de bord</span>
            </a>
            <a href="{% url 'livre-create' %}" class="sidebar-link {% block nav_ajouter %}{% endblock %}">
                <i class="bi bi-plus-circle-fill"></i>
                <span>Ajouter un livre</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-avatar">
                <i class="bi bi-person-fill"></i>
            </div>
            <div>
                <div class="user-name">Bibliothécaire</div>
                <div class="user-role">Administrateur</div>
            </div>
        </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="main-content">
        {% if messages %}
        <div class="flash-list">
            {% for message in messages %}
            <div class="flash-item alert-{{ message.tags }}">
                <span>{{ message }}</span>
                <button class="flash-close" onclick="this.parentElement.remove()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
